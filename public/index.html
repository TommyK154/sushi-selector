<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0f1115" />
    <meta
      name="description"
      content="Turn a photo of a sushi menu into a filterable, searchable list of items with ingredients and prices."
    />
    <title>Sushi Selector</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main id="app" class="screen">
      <header class="app-header">
        <h1 class="app-title">Sushi Selector</h1>
        <p class="app-tagline">Snap the menu, filter the raw stuff out.</p>
      </header>

      <section id="home" class="panel" aria-label="Capture">
        <p class="placeholder">
          Scaffold ready. Capture, parse, and results land in Phase 1 and 2.
        </p>
      </section>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
